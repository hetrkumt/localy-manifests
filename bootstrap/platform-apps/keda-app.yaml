apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-keda
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/my-org/localy-manifests.git"
    targetRevision: HEAD
    path: platform/keda/overlays/prod
  destination:
    server: "https://kubernetes.default.svc"
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
