apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-service
  namespace: store-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: store-service
  template:
    metadata:
      labels:
        app: store-service
    spec:
      serviceAccountName: store-service-sa
      containers:
        - name: app
          image: localy/store-service:latest
          ports:
            - containerPort: 8071
