apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: cart-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: app
          image: localy/cart-service:latest
          ports:
            - containerPort: 8080
