apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - service-account.yaml
  - secret-store.yaml
  - external-secret.yaml
  - ../../base

patches:
  - target:
      group: elbv2.k8s.aws
      version: v1beta1
      kind: TargetGroupBinding
      name: cart-service-tgb
      namespace: cart-service
    patch: |
      - op: replace
        path: /spec/targetGroupARN
        value: arn:aws:elasticloadbalancing:ap-northeast-2:123456789012:targetgroup/localy-prod-cart-tg/abcdef123456
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: cart-service
      namespace: cart-service
    path: deployment-patch.yaml
  - target:
      version: v1
      kind: Service
      name: cart-service-svc
      namespace: cart-service
    path: service-patch.yaml
