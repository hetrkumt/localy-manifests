apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: "https://github.com/my-org/localy-manifests.git"
    path: apps/ingress-core/overlays/prod
    targetRevision: HEAD
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
