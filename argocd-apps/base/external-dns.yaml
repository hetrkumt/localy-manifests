apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: default
  sources:
    - repoURL: "https://kubernetes-sigs.github.io/external-dns/"
      chart: "external-dns"
      targetRevision: "1.14.3"
      helm:
        valueFiles:
          - $values/apps/external-dns/values-prod.yaml
    - repoURL: "https://github.com/my-org/localy-manifests.git"
      targetRevision: HEAD
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
