apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  sources:
    - repoURL: "https://fluent.github.io/helm-charts"
      chart: "fluent-bit"
      targetRevision: "0.47.10"
      helm:
        valueFiles:
          - $values/apps/fluent-bit/values-prod.yaml
    - repoURL: "https://github.com/my-org/localy-manifests.git"
      targetRevision: HEAD
      ref: values
    - repoURL: "https://github.com/my-org/localy-manifests.git"
      targetRevision: HEAD
      path: apps/fluent-bit
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
