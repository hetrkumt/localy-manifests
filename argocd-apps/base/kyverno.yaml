apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  sources:
    - repoURL: "https://kyverno.github.io/kyverno/"
      chart: "kyverno"
      targetRevision: "3.3.4"
      helm:
        valueFiles:
          - $values/apps/kyverno/values-prod.yaml
    - repoURL: "https://github.com/hetrkumt/localy-manifests.git"
      targetRevision: HEAD
      ref: values
    - repoURL: "https://github.com/hetrkumt/localy-manifests.git"
      targetRevision: HEAD
      path: apps/kyverno
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
