apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: default
  sources:
    - repoURL: "https://charts.jetstack.io"
      chart: "cert-manager"
      targetRevision: "v1.14.4"
      helm:
        valueFiles:
          - $values/apps/cert-manager/values-prod.yaml
    - repoURL: "https://github.com/hetrkumt/localy-manifests.git"
      targetRevision: HEAD
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
