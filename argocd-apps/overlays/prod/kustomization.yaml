apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Application
      name: ingress-core
    patch: |
      - op: replace
        path: /spec/source/targetRevision
        value: main
  - target:
      kind: Application
      name: karpenter-provisioner
    patch: |
      - op: replace
        path: /spec/source/targetRevision
        value: main
  - target:
      kind: Application
      name: storage
    patch: |
      - op: replace
        path: /spec/source/targetRevision
        value: main

  - target:
      kind: Application
      name: alb-controller
    patch: |
      - op: replace
        path: /spec/sources/1/targetRevision
        value: main
  - target:
      kind: Application
      name: cert-manager
    patch: |
      - op: replace
        path: /spec/sources/1/targetRevision
        value: main
  - target:
      kind: Application
      name: external-dns
    patch: |
      - op: replace
        path: /spec/sources/1/targetRevision
        value: main
  - target:
      kind: Application
      name: karpenter-controller
    patch: |
      - op: replace
        path: /spec/sources/1/targetRevision
        value: main
  - target:
      kind: Application
      name: node-local-dns
    patch: |
      - op: replace
        path: /spec/sources/1/targetRevision
        value: main

  - target:
      kind: Application
      name: kube-prometheus-stack
    patch: |
      - op: replace
        path: /spec/sources/1/targetRevision
        value: main
      - op: replace
        path: /spec/sources/2/targetRevision
        value: main
  - target:
      kind: Application
      name: loki
    patch: |
      - op: replace
        path: /spec/sources/1/targetRevision
        value: main
      - op: replace
        path: /spec/sources/2/targetRevision
        value: main
  - target:
      kind: Application
      name: kyverno
    patch: |
      - op: replace
        path: /spec/sources/1/targetRevision
        value: main
      - op: replace
        path: /spec/sources/2/targetRevision
        value: main
  - target:
      kind: Application
      name: fluent-bit
    patch: |
      - op: replace
        path: /spec/sources/1/targetRevision
        value: main
      - op: replace
        path: /spec/sources/2/targetRevision
        value: main
