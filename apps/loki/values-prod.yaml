deploymentMode: SimpleScalable

singleBinary:
  replicas: 0

serviceAccount:
  create: true
  name: loki
  annotations:
    eks.amazonaws.com/role-arn: "<PLACEHOLDER_LOKI_IAM_ROLE_ARN>"

write:
  replicas: 3
  terminationGracePeriodSeconds: 300
  persistence:
    volumeClaimsEnabled: false

read:
  legacyReadTarget: false

backend:
  persistence:
    volumeClaimsEnabled: true
    size: 20Gi
    storageClass: gp3

gateway:
  replicas: 3
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  nginxConfig:
    resolver: kube-dns.kube-system.svc.cluster.local valid=30s
  service:
    annotations:
      service.kubernetes.io/topology-mode: "auto"

ruler:
  enabled: true
  replicas: 2
  sidecar: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: loki-core-alerting-rules
      namespace: loki
      labels:
        loki_rule: "1"
    data:
      default-loki-sre.yaml: |
        groups:
          - name: loki_sre_baseline
            rules:
              - alert: LokiComponentOOMKilled
                expr: |
                  sum(count_over_time({namespace="loki", pod=~"loki-.*"} |~ "(?i)oom|killed"[5m])) > 0
                for: 2m
                labels:
                  severity: critical
                  team: sre
                annotations:
                  summary: "Loki pod OOM/kill event detected"
                  description: "Check write/read/ruler pods in loki namespace."

              - alert: LokiHighErrorLogRate
                expr: |
                  sum(rate({namespace=~"loki|monitoring"} |~ "(?i)error|panic|fatal"[5m])) > 5
                for: 5m
                labels:
                  severity: warning
                  team: sre
                annotations:
                  summary: "Elevated error-class log rate"
                  description: "Possible query storm, ingest failure, or upstream dependency issue."

loki:
  auth_enabled: true

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: "<PLACEHOLDER_LOKI_S3_BUCKET_NAME>"
      ruler: "<PLACEHOLDER_LOKI_S3_BUCKET_NAME>"
    s3:
      region: "ap-northeast-2"
      s3ForcePathStyle: false
      insecure: false

  ingester:
    lifecycler:
      ring:
        replication_factor: 3
    chunk_target_size: 5242880
    max_chunk_age: 2h
    chunk_idle_period: 1h

  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    delete_request_store: s3

  limits_config:
    retention_period: 90d
    split_queries_by_interval: 24h
    creation_grace_period: 10m
    max_query_length: 168h
    query_timeout: 300s
    max_entries_limit_per_query: 5000
    max_query_parallelism: 1

  rulerConfig:
    enable_alertmanager_v2: true
    alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
    storage:
      type: s3
      s3:
        region: "ap-northeast-2"
        bucketnames: "<PLACEHOLDER_LOKI_S3_BUCKET_NAME>"
