apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# (참고) RBAC이나 Network Policy 등 직접 만든 K8s 매니페스트가 있다면 여기에 추가
resources:
  - network-policy.yaml
  - rbac/role-binding.yaml
  - cert-manager-tls.yaml

# [핵심] 폴더에 있는 파일들을 배포 시점에 자동으로 ConfigMap으로 말아주는 마법의 설정
configMapGenerator:
  # 1. 그라파나 대시보드 융합
  - name: grafana-dashboards-custom
    files:
      - dashboards/14361_rev1.json
      - dashboards/alb-traffic.json
      - dashboards/k8s-core-metrics.json
      - dashboards/karpenter-metrics.json
    options:
      labels:
        # 이 라벨이 있어야 그라파나가 "아! 이건 대시보드구나" 하고 자동으로 읽어갑니다.
        grafana_dashboard: "1"

  # 2. 알람 룰(Rules) 융합
  - name: prometheus-rules-custom
    files:
      - rules/alarm-pipeline.yaml
    options:
      labels:
        prometheus_rule: "1"

  # 3. 얼럿매니저 템플릿(ChatOps 등) 융합
  - name: alertmanager-templates
    files:
      - alertmanager/chatops-top3.tmpl
