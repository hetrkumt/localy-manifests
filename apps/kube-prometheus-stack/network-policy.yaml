apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alertmanager-zero-trust
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: network-policy
    managed-by: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus ??Alertmanager
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              app.kubernetes.io/instance: kube-prometheus-stack
      ports:
        - protocol: TCP
          port: 9093
    # Loki Ruler ??Alertmanager (observability -> loki è¹‚Â€å¯?
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - loki
          podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
      ports:
        - protocol: TCP
          port: 9093
    # Alertmanager HA ï§Žã…»ì¾?”±????
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
      ports:
        - protocol: TCP
          port: 9094
        - protocol: UDP
          port: 9094
  egress:
    # Alertmanager HA ï§Žã…»ì¾?”±????
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
      ports:
        - protocol: TCP
          port: 9094
        - protocol: UDP
          port: 9094
    # CoreDNS ??€ì«?????
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # SNS/STS Interface VPC Endpoint ENIs
    - to:
        - ipBlock:
            cidr: 10.0.11.93/32
        - ipBlock:
            cidr: 10.0.11.60/32
      ports:
        - protocol: TCP
          port: 443
