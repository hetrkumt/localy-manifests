apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alarm-pipeline-alertmanager-secret-reader
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: rbac
    managed-by: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "watch"]
    resourceNames:
      - "alarm-pipeline-alertmanager-secrets"

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alarm-pipeline-alertmanager-secret-reader
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: rbac
    managed-by: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alarm-pipeline-alertmanager-secret-reader
subjects:
  - kind: ServiceAccount
    name: "alarm-pipeline-sns-publisher"
    namespace: monitoring
