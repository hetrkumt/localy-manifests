apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  role: "prod-eks-karpenter-node-role"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "prod-eks"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "prod-eks"
        kubernetes.io/cluster/prod-eks: "owned"
  tags:
    karpenter.sh/discovery: "prod-eks"
    Name: "karpenter-node-prod-eks"
