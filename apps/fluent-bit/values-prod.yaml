kind: DaemonSet

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack

priorityClassName: system-node-critical

flush: 15

labels:
  app.kubernetes.io/name: fluent-bit

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

initContainers:
  - name: fix-db-permissions
    image: busybox:1.36.1-uclibc
    command: ["sh", "-c", "chown -R 1000:1000 /fluent-bit/log"]
    securityContext:
      runAsUser: 0
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
        add:
          - CHOWN
    volumeMounts:
      - name: flb-offset-db
        mountPath: /fluent-bit/log

extraVolumes:
  - name: flb-storage
    emptyDir:
      sizeLimit: 2Gi
  - name: tmp
    emptyDir:
      sizeLimit: 64Mi
  - name: journal
    hostPath:
      path: /var/log/journal
      type: DirectoryOrCreate
  - name: varlogpods
    hostPath:
      path: /var/log/pods
  - name: varlogcontainers
    hostPath:
      path: /var/log/containers
  - name: flb-offset-db
    hostPath:
      path: /var/log/fluent-bit-db
      type: DirectoryOrCreate

extraVolumeMounts:
  - name: flb-storage
    mountPath: /fluent-bit/flb-storage
  - name: tmp
    mountPath: /tmp
  - name: journal
    mountPath: /var/log/journal
    readOnly: true
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true
  - name: varlogcontainers
    mountPath: /var/log/containers
    readOnly: true
  - name: flb-offset-db
    mountPath: /fluent-bit/log

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: etcmachineid
    mountPath: /etc/machine-id
    readOnly: true

resources:
  requests:
    cpu: 15m
    memory: 64Mi
    ephemeral-storage: 512Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 2Gi

tolerations:
  - operator: Exists

luaScripts:
  pii_mask_payment.lua: |
    function mask_payment_pii(tag, timestamp, record)
        if type(record["log"]) ~= "string" then
            return 0, timestamp, record
        end

        local log = record["log"]

        -- 移대뱶踰덊샇 (怨좎젙湲몄씠 ?듭빱)
        log = string.gsub(log, "%d%d%d%d%-%d%d%d%d%-%d%d%d%d%-%d%d%d%d", "[REDACTED_CARD]")
        log = string.gsub(log, "%d%d%d%d%d%d%d%d%d%d%d%d%d%d%d%d", "[REDACTED_CARD]")
        
        -- ?대찓??(?⑥닚 bounded ?⑦꽩)
        log = string.gsub(log, "[%w%.%-]+@[%w%.%-]+%.%w+", "[REDACTED_EMAIL]")

        -- ?꾪솕踰덊샇 KR (+82 / 010)
        log = string.gsub(log, "(%+82%-?)[%d%-]+", "%1[REDACTED_PHONE]")
        log = string.gsub(log, "010%-[%d%-]+", "[REDACTED_PHONE]")

        record["log"] = log
        return 1, timestamp, record
    end

config:
  service: |
    [SERVICE]
        Daemon                    Off
        Flush                     15
        Log_Level                 info
        Parsers_File              /fluent-bit/etc/parsers.conf
        Parsers_File              /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server               On
        HTTP_Listen               0.0.0.0
        HTTP_Port                 2020
        Health_Check              On
        storage.path              /fluent-bit/flb-storage/
        storage.sync              normal
        storage.checksum          off
        storage.max_chunks_up     128
        storage.backlog.mem_limit 50M
        scheduler.base            5
        scheduler.cap             300

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        multiline_flush   2
        Buffer_Max_Size   5M
        Tag               kube.*
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        storage.type      filesystem
        DB                /fluent-bit/log/flb_kube.db

    [INPUT]
        Name              systemd
        Tag               host.*
        Systemd_Filter    _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail    On
        Mem_Buf_Limit     50MB
        storage.type      filesystem

  filters: |
    [FILTER]
        Name      grep
        Match     kube.*
        Exclude   log .*(ELB-HealthChecker|kube-probe).*

    [FILTER]
        Name    lua
        Match   kube.*_payment_*
        script  /fluent-bit/scripts/pii_mask_payment.lua
        call    mask_payment_pii

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Use_Kubelet         On
        Kubelet_Port        10250
        Kube_Meta_Cache_TTL 300s

    [FILTER]
        Name      grep
        Match     kube.*
        Logical_Op OR
        Regex     $kubernetes['namespace_name'] ^(kube-system|karpenter)$
        Regex     $kubernetes['labels']['finops.logging/include'] true

  outputs: |
    [OUTPUT]
        Name          loki
        Match         *
        Host          loki-gateway.loki.svc.cluster.local
        Port          3100
        tenant_id     default
        Labels        {job="fluent-bit", namespace="$kubernetes['namespace_name']", pod="$kubernetes['pod_name']", container="$kubernetes['container_name']"}
        Line_Format   json
        Compress      gzip
        Retry_Limit   False

  customParsers: |
    [PARSER]
        Name        docker_no_time
        Format      json
        Time_Keep   Off
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
