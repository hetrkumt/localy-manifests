apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kyverno-admission-ingress-zero-trust
  namespace: kyverno
  labels:
    app.kubernetes.io/name: kyverno
    app.kubernetes.io/component: network-policy
    managed-by: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # [諛⑹뼱??1] Control Plane ?뱁썒 ?섏떊
    - from:
        - ipBlock:
            cidr: <PLACEHOLDER_EKS_CP_SUBNET_CIDR>
      ports:
        - protocol: TCP
          port: 9443
    # Kyverno ?대? 而댄룷?뚰듃 媛??듭떊 ?덉슜
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kyverno
      ports:
        - protocol: TCP
          port: 9443
  egress:
    # [諛⑹뼱??2] K8s API ?쒕쾭 ?듭떊
    - to:
        - ipBlock:
            cidr: <PLACEHOLDER_KUBERNETES_API_CLUSTER_IP>/32
      ports:
        - protocol: TCP
          port: 443
    # CoreDNS ?대쫫 ????덉슜
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
