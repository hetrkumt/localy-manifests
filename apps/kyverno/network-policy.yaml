apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kyverno-admission-ingress-zero-trust
  namespace: kyverno
  labels:
    app.kubernetes.io/name: kyverno
    app.kubernetes.io/component: network-policy
    managed-by: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # [방어선 1] Control Plane 웹훅 수신
    - from:
        - ipBlock:
            cidr: <PLACEHOLDER_EKS_CP_SUBNET_CIDR>
      ports:
        - protocol: TCP
          port: 9443
    # Kyverno 내부 컴포넌트 간 통신 허용
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kyverno
      ports:
        - protocol: TCP
          port: 9443
  egress:
    # [방어선 2] K8s API 서버 통신
    - to:
        - ipBlock:
            cidr: <PLACEHOLDER_KUBERNETES_API_CLUSTER_IP>/32
      ports:
        - protocol: TCP
          port: 443
    # CoreDNS 이름 풀이 허용
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
