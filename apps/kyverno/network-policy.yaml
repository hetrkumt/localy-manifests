apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kyverno-admission-ingress-zero-trust
  namespace: kyverno
  labels:
    app.kubernetes.io/name: kyverno
    app.kubernetes.io/component: network-policy
    managed-by: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # [и«ӣв‘№лј??1] Control Plane ?лұҒмҚ’ ??Ҹл–Ҡ
    - from:
        - ipBlock:
            cidr: 10.0.12.0/24,10.0.13.0/24,10.0.11.0/24
      ports:
        - protocol: TCP
          port: 9443
    # Kyverno ??Җ? ?ҢлҢ„лЈ??°л“ғ еӘ????–Ҡ ??үмҠң
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kyverno
      ports:
        - protocol: TCP
          port: 9443
  egress:
    # [и«ӣв‘№лј??2] K8s API ??•мҫӯ ???–Ҡ
    - to:
        - ipBlock:
            cidr: 10.100.0.1/32
      ports:
        - protocol: TCP
          port: 443
    # CoreDNS ??Җм«???????үмҠң
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
