apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

helmCharts:
  - name: keycloak
    repo: oci://registry-1.docker.io/bitnamicharts
    version: 24.7.7
    releaseName: keycloak
    namespace: auth-namespace
    valuesFile: values.yaml

configMapGenerator:
  - name: keycloak-realm-config
    namespace: auth-namespace
    files:
      - realm-import.json
