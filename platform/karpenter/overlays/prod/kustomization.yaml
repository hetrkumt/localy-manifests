apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - node-pool.yaml
  - ec2-node-class.yaml

patches:
  # 1. Karpenter ?뚢뫂?껅에?살쑎???類ㅼ읅 system ?紐껊굡 域밸챶竊??곗쨮 野꺿뫖????곕뻼 (?怨뺣굡??獄쎻뫗?)
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: karpenter
      namespace: kube-system
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          role: system

  # 2. Karpenter Controller IRSA 亦낅슦釉?Role ARN) ??ν뒄
  - target:
      version: v1
      kind: ServiceAccount
      name: karpenter
      namespace: kube-system
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          eks.amazonaws.com/role-arn: "arn:aws:iam::533003975005:role/prod-eks-karpenter-controller-role"

  # 3. EC2NodeClass??Node Role Name????ν뒄
  - target:
      group: karpenter.k8s.aws
      version: v1beta1
      kind: EC2NodeClass
      name: default
    patch: |
      - op: replace
        path: /spec/role
        value: localy-prod-karpenter-node-role
