apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - node-pool.yaml
  - ec2-node-class.yaml

patches:
  # 1. Karpenter 而⑦듃濡ㅻ윭瑜??뺤쟻 system ?몃뱶 洹몃９?쇰줈 寃⑸━ ?쇰떇 (?곕뱶??諛⑹?)
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: karpenter
      namespace: kube-system
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          role: system

  # 2. Karpenter Controller IRSA 沅뚰븳(Role ARN) ?⑥튂
  - target:
      version: v1
      kind: ServiceAccount
      name: karpenter
      namespace: kube-system
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/localy-prod-karpenter-controller

  # 3. EC2NodeClass??Node Role Name???⑥튂
  - target:
      group: karpenter.k8s.aws
      version: v1beta1
      kind: EC2NodeClass
      name: default
    patch: |
      - op: replace
        path: /spec/role
        value: localy-prod-karpenter-node-role
