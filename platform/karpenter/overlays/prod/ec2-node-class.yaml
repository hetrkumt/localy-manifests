apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  role: "localy-prod-karpenter-node-role"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: localy-prod-eks
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: localy-prod-eks
  metadataOptions:
    httpTokens: required
    httpPutResponseHopLimit: 1
    httpEndpoint: enabled
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
