apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: platform-pool
spec:
  template:
    metadata:
      labels:
        role: platform
    spec:
      taints:
        - key: platform-only
          value: "true"
          effect: NoSchedule
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
      nodeClassRef:
        name: default
  disruption:
    consolidationPolicy: WhenEmpty
    expireAfter: 336h
---
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: workload-pool
spec:
  template:
    metadata:
      labels:
        role: workload
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: node.kubernetes.io/instance-type
          operator: NotIn
          values:
            - t3.nano
            - t3.micro
            - t3.small
            - t3.medium
            - t3.large
            - t3.xlarge
            - t3.2xlarge
            - t4g.nano
            - t4g.micro
            - t4g.small
            - t4g.medium
            - t4g.large
            - t4g.xlarge
            - t4g.2xlarge
      nodeClassRef:
        name: default
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 336h
