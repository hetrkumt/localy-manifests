apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      version: v1
      kind: ConfigMap
      name: node-local-dns
      namespace: kube-system
    patch: |
      - op: replace
        path: /data/Corefile
        value: |
          cluster.local:53 {
              errors
              cache {
                      success 9984 30
                      denial 9984 5
              }
              reload
              loop
              bind 169.254.20.10
              forward . 10.100.0.10 {
                      force_tcp
              }
              prometheus :9253
              health 169.254.20.10:8080
          }
